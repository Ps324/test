<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nujeens Flucht</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Nujeens Flucht</h1>
    <p>Ein interaktives Entscheidungs-Spiel über eine gefährliche Reise von Aleppo nach Deutschland.</p>
  </header>
  <main>
    <div id="stats">
      <span id="money">💰 Taler: 100</span>
      <span id="safety">🛡️ Sicherheit: 0</span>
      <span id="health">🩺 Gesundheit: 0</span>
      <span id="family">👪 Familie: 0</span>
      <span id="documents">📄 Dokumente: 0</span>
      <span id="future">🎓 Zukunft: 0</span>
    </div>
    <hr>
    <div id="story"></div>
    <div id="choices" class="choices"></div>
  </main>
  <footer>
    <small>Bildungsprojekt nach der Geschichte von Nujeen Mustafa.</small>
  </footer>
  <script src="script.js"></script>
</body>
</html>
